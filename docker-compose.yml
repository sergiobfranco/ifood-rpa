services:
  ifood-rpa:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ifood-rpa
    ports:
      - "8570:8570"
    volumes:
      # Persiste o cache do ChromeDriver entre reinicializações
      - chromedriver-cache:/root/.wdm
    restart: unless-stopped

volumes:
  chromedriver-cache: